name: SRE Eval Gate

on:
  pull_request:
    paths:
      - "app/package.json"
      - "app/package-lock.json"
      - "app/scripts/sre-eval-*.js"
      - "app/src/sre/**"
      - ".github/workflows/sre-eval.yml"
  push:
    branches:
      - main
    paths:
      - "app/package.json"
      - "app/package-lock.json"
      - "app/scripts/sre-eval-*.js"
      - "app/src/sre/**"
      - ".github/workflows/sre-eval.yml"

jobs:
  deterministic-sre-eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run SRE eval release gate
        run: npm run test:sre-eval:release
