name: Supercheck CLI

on:
  workflow_call:
    inputs:
      job-id:
        description: 'Job ID to trigger'
        required: true
        type: string
      wait:
        description: 'Wait for the run to complete'
        required: false
        type: boolean
        default: true
      timeout:
        description: 'Maximum wait time in seconds'
        required: false
        type: number
        default: 300
      supercheck-url:
        description: 'Supercheck API URL (for self-hosted)'
        required: false
        type: string
        default: ''
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      cli-version:
        description: 'Supercheck CLI version (npm tag or semver)'
        required: false
        type: string
        default: 'latest'
    secrets:
      SUPERCHECK_TRIGGER_KEY:
        description: 'Trigger key (sck_trigger_*) for the target job'
        required: true
      SUPERCHECK_TOKEN:
        description: 'CLI token (sck_live_*) used for --wait polling and other API calls'
        required: false
    outputs:
      run-id:
        description: 'The run ID created by the job trigger'
        value: ${{ jobs.supercheck.outputs.run-id }}
      status:
        description: 'Final run status when wait=true (empty when wait=false)'
        value: ${{ jobs.supercheck.outputs.status }}

permissions:
  contents: read

jobs:
  supercheck:
    name: Run Supercheck Job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run-id: ${{ steps.trigger.outputs.run-id }}
      status: ${{ steps.trigger.outputs.status }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install Supercheck CLI
        run: npm install -g @supercheck/cli@${{ inputs.cli-version }}

      - name: Validate Inputs
        id: validate
        run: |
          if [ -n "$SUPERCHECK_TOKEN" ]; then
            echo "has-cli-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-cli-token=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$INPUT_WAIT" = "true" ] && [ -z "$SUPERCHECK_TOKEN" ]; then
            echo "SUPERCHECK_TOKEN is required when wait=true." >&2
            exit 1
          fi
        env:
          INPUT_WAIT: ${{ inputs.wait }}
          SUPERCHECK_TOKEN: ${{ secrets.SUPERCHECK_TOKEN }}

      - name: Verify CLI Token
        if: steps.validate.outputs.has-cli-token == 'true'
        run: supercheck whoami
        env:
          SUPERCHECK_TOKEN: ${{ secrets.SUPERCHECK_TOKEN }}
          SUPERCHECK_URL: ${{ inputs.supercheck-url }}

      - name: Trigger Job
        id: trigger
        run: |
          ARGS=("$INPUT_JOB_ID")
          if [ "$INPUT_WAIT" = "true" ]; then
            ARGS+=("--wait" "--timeout" "$INPUT_TIMEOUT")
          fi
          ARGS+=("--json")

          echo "Running: supercheck job trigger ${ARGS[*]}"
          OUTPUT=$(supercheck job trigger "${ARGS[@]}" 2>&1) || EXIT_CODE=$?

          # Extract run ID and status from JSON output using node (already available)
          RUN_ID=$(echo "$OUTPUT" | node -e "try{const d=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log(d.runId||'')}catch{console.log('')}" || true)
          STATUS=$(echo "$OUTPUT" | node -e "try{const d=JSON.parse(require('fs').readFileSync(0,'utf8'));console.log(d.status||'')}catch{console.log('')}" || true)

          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          echo "$OUTPUT"
          exit ${EXIT_CODE:-0}
        env:
          SUPERCHECK_TRIGGER_KEY: ${{ secrets.SUPERCHECK_TRIGGER_KEY }}
          SUPERCHECK_TOKEN: ${{ secrets.SUPERCHECK_TOKEN }}
          SUPERCHECK_URL: ${{ inputs.supercheck-url }}
          INPUT_JOB_ID: ${{ inputs.job-id }}
          INPUT_WAIT: ${{ inputs.wait }}
          INPUT_TIMEOUT: ${{ inputs.timeout }}
