server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: aisre-demo-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: aisre-demo-service
          service: checkout-api
          fixture: oss-lab-checkout-degradation
          __path__: /var/log/aisre-demo/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            route: route
            status: status
            message: message
      - labels:
          level:
          route:
          status:
